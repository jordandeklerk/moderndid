---
name: "Pull Request Labeler"
on:
- pull_request_target

jobs:
  sync:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Sync labels with closing issues
        uses: williambdean/closing-labels@f4c2fcadcb3df832d1cb6db483d79df85647acec # v0.0.7
        with:
          exclude: "duplicate,help wanted,question"
        env:
          GH_TOKEN: ${{ github.token }}
