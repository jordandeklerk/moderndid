name: Full test suite
on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  test-full:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }} (full)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-gh-actions
      - name: Run full test suite
        run: tox ${{ runner.os == 'Windows' && '-- --ignore=tests/validation -vv' || '' }}
        env:
          SKIP: no-commit-to-branch
          TEST_SUITE: full
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: ${{ matrix.os }} / Python ${{ matrix.python-version }} (full)
          fail_ci_if_error: false

  test-dask:
    name: ${{ matrix.os }} / Dask (Python ${{ matrix.python-version }}) (full)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run Dask test suite with coverage
        run: tox -e dask-coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: ${{ matrix.os }} / Dask Python ${{ matrix.python-version }} (full)
          fail_ci_if_error: false
